# 语义规划层 recipe：用 semantic_plan 替换 sample，启用"问题级语义覆盖层"。
#   - 在固定物理证据图 G0 上为每个问题动态构建临时语义覆盖 Ωq (虚拟逻辑边)，
#     按综合评分引导物理扩展 + 角色分配 + 虚拟逻辑补全 + 逻辑充分性验证，
#     虚拟边仅服务规划，最终 required_nodes / evidence 仍回落到 G0 物理节点。
#   - 与 five.yaml 唯一区别：sample → semantic_plan (输出同为 question_plans.jsonl，
#     下游 generate / corrupt / verify / repair 完全复用，零改动)。
# 运行：python -m autoqag.pipeline --recipe recipes/semantic.yaml

work_dir: outputs/semantic

global_params:
  domain: metamaterials
  llm:
    model: deepseek-chat
    max_concurrency: 8

pipeline:
  - stage: ingest
    params:
      input_dir: data/five
      recursive: false

  - stage: parse
    params:
      backend: pipeline
      method: auto
      device: cpu
      fallback: pymupdf
      fallback_on_low: true

  - stage: normalize
    params:
      normalize_units: true

  - stage: graph
    params:
      extract_points: true
      max_text_blocks: 120
      parse_table_cells: true
      cross_paper: true

  - stage: semantic_plan
    params:
      per_type: 12             # 10 题型 × 12 = 最多 120 plan（按逻辑充分性门槛过滤）

  - stage: generate
    params:
      max_plans: 96

  - stage: corrupt
    params: {per_qa: 2}

  - stage: verify
    params:
      semantic_check: true

  - stage: repair
    params: {max_rounds: 3}

  - stage: output
    params: {}
